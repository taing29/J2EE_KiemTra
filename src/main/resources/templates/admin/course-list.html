<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản lý học phần - Admin</title>
    <th:block th:replace="~{fragments/header :: styles}"/>
    <style>
        .admin-header { background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.03)); border: 1px solid rgba(245,158,11,0.15); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .admin-badge { background: rgba(245,158,11,0.15); color: var(--yellow); padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 700; }
        .course-thumb { width: 48px; height: 36px; border-radius: 6px; object-fit: cover; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; }
        .course-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .action-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/header :: navbar}"/>

<div class="main-container">

    <!-- Admin Header -->
    <div class="admin-header">
        <span style="font-size:22px;">⚙</span>
        <div>
            <div style="font-weight:600;">Bảng quản trị</div>
            <div style="font-size:12px;color:var(--text2);">Quản lý toàn bộ học phần trong hệ thống</div>
        </div>
        <span class="admin-badge">ADMIN</span>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" th:text="${courses.size()}">0</div>
            <div class="stat-label">📚 Tổng học phần</div>
        </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <!-- Page header -->
    <div class="page-header">
        <div>
            <h1 class="page-header-title">Danh sách học phần</h1>
        </div>
        <a th:href="@{/admin/courses/add}" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Thêm học phần
        </a>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table class="table">
            <thead>
            <tr>
                <th>#</th>
                <th>Ảnh</th>
                <th>Tên học phần</th>
                <th>Giảng viên</th>
                <th>Tín chỉ</th>
                <th>Danh mục</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${courses.empty}">
                <td colspan="7" style="text-align:center;padding:40px;color:var(--text3);">Chưa có học phần nào</td>
            </tr>
            <tr th:each="course, stat : ${courses}">
                <td style="color:var(--text3);" th:text="${stat.count}"></td>
                <td>
                    <div class="course-thumb">
                        <img th:if="${course.image != null and !course.image.isBlank()}"
                             th:src="@{'/images/uploads/' + ${course.image}}"
                             th:alt="${course.name}"/>
                        <span th:unless="${course.image != null and !course.image.isBlank()}">📖</span>
                    </div>
                </td>
                <td style="font-weight:500;color:var(--text);" th:text="${course.name}"></td>
                <td th:text="${course.lecturer}"></td>
                <td>
                    <span class="badge badge-purple" th:text="${course.credits} + ' TC'"></span>
                </td>
                <td>
                    <span th:if="${course.category != null}" class="badge badge-gray" th:text="${course.category.name}"></span>
                    <span th:unless="${course.category != null}" style="color:var(--text3)">—</span>
                </td>
                <td>
                    <div class="action-group">
                        <a th:href="@{'/admin/courses/edit/' + ${course.id}}" class="btn btn-warning btn-sm">
                            ✎ Sửa
                        </a>
                        <form th:action="@{'/admin/courses/delete/' + ${course.id}}" method="post" style="margin:0"
                              onsubmit="return confirm('Xóa học phần này?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger btn-sm">🗑 Xóa</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block th:replace="~{fragments/header :: scripts}"/>
</body>
</html>
