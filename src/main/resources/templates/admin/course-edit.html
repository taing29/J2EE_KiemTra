<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sửa học phần - Admin</title>
    <th:block th:replace="~{fragments/header :: styles}"/>
    <style>
        .form-wrapper { max-width: 600px; margin: 0 auto; }
        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 24px; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
        .file-upload-area:hover { border-color: var(--accent); background: rgba(99,102,241,0.03); }
        .current-image-box {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
        }
        .current-image-box img {
            width: 72px; height: 54px;
            object-fit: cover; border-radius: 6px;
            flex-shrink: 0;
        }
        .current-image-box .no-img {
            width: 72px; height: 54px;
            background: var(--bg3);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        #new-preview {
            max-width: 100%; max-height: 160px;
            border-radius: var(--radius-sm);
            display: none; margin-top: 12px;
            border: 1px solid var(--border);
        }
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 24px; font-size: 13px; color: var(--text3);
        }
        .breadcrumb a { color: var(--accent2); text-decoration: none; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: navbar}"/>

<div class="main-container">
    <div class="form-wrapper">

        <div class="breadcrumb">
            <a th:href="@{/admin/courses}">⚙ Quản lý</a>
            <span>›</span>
            <span style="color:var(--text);">Chỉnh sửa học phần</span>
        </div>

        <div class="form-card">
            <h2 class="form-title">✎ Chỉnh sửa học phần</h2>
            <p class="form-subtitle" style="margin-bottom:24px;">
                ID: #<span th:text="${course.id}"></span> —
                <span th:text="${course.name}" style="color:var(--accent2);"></span>
            </p>

            <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

            <form th:action="@{'/admin/courses/edit/' + ${course.id}}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!--  ✅ GỬI existingImage (tên file cũ) để giữ ảnh khi không upload mới -->
                <input type="hidden" name="existingImage" th:value="${course.image}"/>

                <div class="form-group">
                    <label class="form-label">Tên học phần *</label>
                    <input type="text" name="name" th:value="${courseDTO.name}"
                           class="form-control" required autofocus/>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label class="form-label">Số tín chỉ *</label>
                        <input type="number" name="credits" th:value="${courseDTO.credits}"
                               min="1" max="10" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Danh mục</label>
                        <select name="categoryId" class="form-control form-select">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${courseDTO.categoryId != null and courseDTO.categoryId == cat.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Giảng viên *</label>
                    <input type="text" name="lecturer" th:value="${courseDTO.lecturer}"
                           class="form-control" required/>
                </div>

                <div class="form-group">
                    <label class="form-label">Hình ảnh</label>

                    <!-- Ảnh hiện tại -->
                    <div class="current-image-box">
                        <img th:if="${course.image != null and !course.image.isBlank()}"
                             th:src="@{'/images/uploads/' + ${course.image}}"
                             alt="Ảnh hiện tại"/>
                        <div th:unless="${course.image != null and !course.image.isBlank()}"
                             class="no-img">📖</div>
                        <div>
                            <div style="font-size:13px;color:var(--text2);font-weight:500;">Ảnh hiện tại</div>
                            <div style="font-size:11px;color:var(--text3);margin-top:2px;"
                                 th:text="${course.image != null ? course.image : 'Chưa có ảnh'}"></div>
                        </div>
                    </div>

                    <!-- Upload ảnh mới -->
                    <div class="file-upload-area" onclick="document.getElementById('imageFile').click()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                             stroke="var(--text3)" stroke-width="1.5"
                             style="display:block;margin:0 auto 8px;">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p style="color:var(--text2);font-size:13px;">
                            Chọn ảnh mới để thay thế
                        </p>
                        <p style="color:var(--text3);font-size:11px;margin-top:4px;">
                            Để trống = giữ ảnh cũ
                        </p>
                        <!-- Preview ảnh mới chọn -->
                        <img id="new-preview" src="" alt="Preview"/>
                    </div>
                    <input type="file" id="imageFile" name="imageFile"
                           accept="image/*" style="display:none"
                           onchange="previewNewImage(this)"/>
                </div>

                <div style="display:flex;gap:12px;margin-top:8px;">
                    <button type="submit" class="btn btn-primary"
                            style="flex:1;justify-content:center;padding:12px;">
                        ✓ Cập nhật
                    </button>
                    <a th:href="@{/admin/courses}" class="btn btn-outline"
                       style="padding:12px 20px;">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function previewNewImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('new-preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }
</script>
<th:block th:replace="~{fragments/header :: scripts}"/>
</body>
</html>
