<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar">
    <div class="navbar-brand">
        <a th:href="@{/home}" class="brand-link">
            <span class="brand-icon">🎓</span>
            <span class="brand-text">EduPortal</span>
        </a>
    </div>

    <!-- Câu 8: Thanh tìm kiếm -->
    <form th:action="@{/home}" method="get" class="search-form">
        <div class="search-box">
            <input type="text" name="keyword" th:value="${keyword}"
                   placeholder="Tìm kiếm học phần..." class="search-input" autocomplete="off"/>
            <button type="submit" class="search-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </div>
    </form>

    <div class="navbar-actions">
        <!-- Chưa đăng nhập -->
        <div sec:authorize="!isAuthenticated()" class="nav-links">
            <a th:href="@{/auth/login}" class="btn btn-outline">Đăng nhập</a>
            <a th:href="@{/auth/register}" class="btn btn-primary">Đăng ký</a>
        </div>

        <!-- Đã đăng nhập -->
        <div sec:authorize="isAuthenticated()" class="nav-user">
            <div class="nav-links">
                <a th:href="@{/home}" class="nav-link">Học phần</a>
                <a sec:authorize="hasRole('STUDENT')" th:href="@{/enroll/my-courses}" class="nav-link">Của tôi</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/courses}" class="nav-link nav-link-admin">⚙ Quản lý</a>
            </div>
            <div class="user-menu">
                <div class="user-avatar" onclick="toggleDropdown()">
                    <span sec:authentication="name" class="user-name"></span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-header">
                        <small>Xin chào,</small>
                        <strong sec:authentication="name"></strong>
                        <span sec:authorize="hasRole('ADMIN')" class="role-badge admin">ADMIN</span>
                        <span sec:authorize="hasRole('STUDENT')" class="role-badge student">STUDENT</span>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a sec:authorize="hasRole('STUDENT')" th:href="@{/enroll/my-courses}" class="dropdown-item">
                        📚 Học phần của tôi
                    </a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/courses}" class="dropdown-item">
                        ⚙ Quản lý học phần
                    </a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/auth/logout}" method="post" style="margin:0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="dropdown-item logout-btn">🚪 Đăng xuất</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ===== HEAD STYLES ===== -->
<th:block th:fragment="styles">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --bg2: #141720;
            --bg3: #1c2030;
            --card: #1a1d27;
            --card-hover: #1f2333;
            --border: #2a2d3e;
            --border-light: #353849;
            --accent: #6366f1;
            --accent2: #818cf8;
            --accent3: #4f46e5;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --text3: #64748b;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
            --transition: 0.2s ease;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            height: 64px;
            background: rgba(13,15,20,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .brand-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            white-space: nowrap;
        }
        .brand-icon { font-size: 22px; }
        .brand-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search */
        .search-form { flex: 1; max-width: 400px; }
        .search-box { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: 50px; overflow: hidden; transition: border-color var(--transition); }
        .search-box:focus-within { border-color: var(--accent); }
        .search-input { flex: 1; background: none; border: none; outline: none; padding: 8px 16px; color: var(--text); font-size: 14px; font-family: inherit; }
        .search-input::placeholder { color: var(--text3); }
        .search-btn { background: none; border: none; cursor: pointer; padding: 8px 14px; color: var(--text2); display: flex; align-items: center; transition: color var(--transition); }
        .search-btn:hover { color: var(--accent2); }

        /* Nav */
        .navbar-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-link { padding: 6px 12px; color: var(--text2); text-decoration: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; transition: all var(--transition); }
        .nav-link:hover { color: var(--text); background: var(--bg3); }
        .nav-link-admin { color: var(--yellow) !important; }

        /* Buttons */
        .btn { padding: 7px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent3); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border-light); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-warning { background: #d97706; color: #fff; }
        .btn-warning:hover { background: #b45309; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        .btn-icon { width: 34px; height: 34px; padding: 0; justify-content: center; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* User menu */
        .nav-user { display: flex; align-items: center; gap: 10px; }
        .user-menu { position: relative; }
        .user-avatar { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; transition: all var(--transition); font-size: 14px; font-weight: 500; }
        .user-avatar:hover { border-color: var(--accent); }
        .dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); min-width: 200px; box-shadow: var(--shadow-lg); overflow: hidden; }
        .dropdown-menu.show { display: block; animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-header { padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; }
        .dropdown-header small { color: var(--text3); font-size: 11px; }
        .dropdown-header strong { color: var(--text); font-size: 14px; }
        .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
        .dropdown-item { display: block; width: 100%; padding: 10px 16px; color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500; background: none; border: none; cursor: pointer; font-family: inherit; text-align: left; transition: all var(--transition); }
        .dropdown-item:hover { background: var(--bg3); color: var(--text); }
        .logout-btn { color: var(--red) !important; }
        .role-badge { display: inline-block; padding: 2px 8px; border-radius: 50px; font-size: 10px; font-weight: 700; margin-top: 2px; }
        .role-badge.admin { background: rgba(245,158,11,0.15); color: var(--yellow); }
        .role-badge.student { background: rgba(99,102,241,0.15); color: var(--accent2); }

        /* ===== LAYOUT ===== */
        .main-container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        /* ===== CARDS ===== */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all 0.25s ease; }
        .card:hover { border-color: var(--border-light); transform: translateY(-3px); box-shadow: var(--shadow); }

        /* Course grid */
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .course-card { display: flex; flex-direction: column; }
        .course-img { width: 100%; height: 150px; object-fit: cover; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .course-img img { width: 100%; height: 100%; object-fit: cover; }
        .course-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .course-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
        .course-meta { display: flex; flex-direction: column; gap: 4px; }
        .course-meta-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
        .course-meta-item svg { flex-shrink: 0; }
        .course-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; }
        .badge-purple { background: rgba(99,102,241,0.15); color: var(--accent2); }
        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-gray { background: rgba(148,163,184,0.1); color: var(--text2); }

        /* ===== PAGINATION ===== */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 40px; }
        .page-btn { min-width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); text-decoration: none; font-size: 14px; font-weight: 500; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); transition: all var(--transition); padding: 0 10px; }
        .page-btn:hover { border-color: var(--accent); color: var(--accent2); }
        .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* ===== FORMS ===== */
        .form-container { max-width: 480px; margin: 0 auto; }
        .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; }
        .form-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .form-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color var(--transition); }
        .form-control:focus { border-color: var(--accent); }
        .form-control.is-invalid { border-color: var(--red); }
        .invalid-feedback { color: var(--red); font-size: 12px; margin-top: 4px; }
        .form-select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; cursor: pointer; }

        /* ===== ALERTS ===== */
        .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; margin-bottom: 16px; }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
        .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
        .alert-info { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: var(--accent2); }

        /* ===== TABLES ===== */
        .table-wrapper { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
        .table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .table th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); background: var(--bg2); border-bottom: 1px solid var(--border); white-space: nowrap; }
        .table td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
        .table tr:last-child td { border-bottom: none; }
        .table tr:hover td { background: var(--bg3); }
        .table-img { width: 48px; height: 36px; object-fit: cover; border-radius: 6px; background: var(--bg2); display: flex; align-items: center; justify-content: center; }

        /* ===== PAGE HEADER ===== */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .page-header-title { font-size: 22px; font-weight: 700; }
        .page-header-subtitle { color: var(--text2); font-size: 14px; margin-top: 2px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; gap: 10px; }
            .brand-text { display: none; }
            .search-form { max-width: none; }
            .nav-links { display: none; }
            .main-container { padding: 20px 16px; }
            .course-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .form-card { padding: 24px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .course-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
        }
    </style>
</th:block>

<!-- ===== SCRIPTS FRAGMENT ===== -->
<th:block th:fragment="scripts">
    <script>
        function toggleDropdown() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('show');
        }
        document.addEventListener('click', function(e) {
            const userMenu = document.querySelector('.user-menu');
            if (userMenu && !userMenu.contains(e.target)) {
                document.getElementById('dropdownMenu')?.classList.remove('show');
            }
        });
    </script>
</th:block>
</html>
