<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduPortal - Danh sách học phần</title>
    <th:block th:replace="~{fragments/header :: styles}"/>
    <style>
        /* ===== FIX COURSE CARD ===== */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .course-card {
            display: flex;
            flex-direction: column;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.25s ease;
        }
        .course-card:hover {
            border-color: var(--border-light);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ✅ Fix: ảnh luôn cùng kích thước, không bị vỡ layout */
        .course-thumb {
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: linear-gradient(135deg, #1c2030, #141720);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }
        .course-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;      /* ✅ crop ảnh vừa khung, không méo */
            object-position: center;
            display: block;
        }
        .course-thumb-icon {
            font-size: 48px;
            opacity: 0.6;
        }

        /* Category badge trên ảnh */
        .course-cat-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(13,15,20,0.75);
            backdrop-filter: blur(6px);
            color: var(--accent2);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(99,102,241,0.3);
        }

        .course-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .course-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: auto;
        }
        .course-meta-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--text2);
        }
        .course-meta-item svg { flex-shrink: 0; color: var(--text3); }

        .course-credits-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(99,102,241,0.12);
            color: var(--accent2);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .course-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        /* Enroll button */
        .btn-enroll {
            width: 100%;
            padding: 9px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-enroll:hover { background: var(--accent3); transform: translateY(-1px); }

        .btn-enrolled {
            width: 100%;
            padding: 9px;
            background: rgba(34,197,94,0.12);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .btn-login-to-enroll {
            display: block;
            width: 100%;
            padding: 9px;
            background: transparent;
            color: var(--text3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-login-to-enroll:hover {
            border-color: var(--accent);
            color: var(--accent2);
        }

        /* Page header */
        .page-header { margin-bottom: 28px; }
        .page-header h1 { font-size: 22px; font-weight: 700; }
        .page-header p { color: var(--text2); font-size: 14px; margin-top: 4px; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 48px;
        }
        .page-btn {
            min-width: 38px; height: 38px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 14px; font-weight: 500;
            color: var(--text2);
            background: var(--bg3);
            border: 1px solid var(--border);
            transition: all 0.2s;
            padding: 0 12px;
        }
        .page-btn:hover { border-color: var(--accent); color: var(--accent2); }
        .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .page-btn.disabled { opacity: 0.35; pointer-events: none; }

        /* Alert */
        .alert-enroll {
            padding: 12px 16px;
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.25);
            color: var(--accent2);
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Empty */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text2); }

        @media (max-width: 768px) {
            .course-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .course-thumb { height: 130px; }
        }
        @media (max-width: 480px) {
            .course-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/header :: navbar}"/>

<div class="main-container">

    <!-- Flash enroll message -->
    <div th:if="${enrollMsg}" class="alert-enroll" th:text="${enrollMsg}"></div>

    <!-- Page header -->
    <div class="page-header">
        <h1>
            <span th:if="${keyword == null or keyword.isBlank()}">📚 Tất cả học phần</span>
            <span th:unless="${keyword == null or keyword.isBlank()}">
                🔍 Kết quả: "<span th:text="${keyword}"></span>"
            </span>
        </h1>
        <p th:text="'Hiển thị ' + ${coursePage.numberOfElements} + ' / ' + ${coursePage.totalElements} + ' học phần'"></p>
    </div>

    <!-- Course Grid -->
    <div th:if="${coursePage.hasContent()}" class="course-grid">
        <div th:each="course : ${coursePage.content}" class="course-card">

            <!-- Thumbnail -->
            <div class="course-thumb">
                <img th:if="${course.image != null and !course.image.isBlank()}"
                     th:src="@{'/images/uploads/' + ${course.image}}"
                     th:alt="${course.name}"
                     loading="lazy"/>
                <span th:unless="${course.image != null and !course.image.isBlank()}"
                      class="course-thumb-icon">📖</span>

                <!-- Category badge trên ảnh -->
                <span th:if="${course.category != null}"
                      class="course-cat-badge"
                      th:text="${course.category.name}"></span>
            </div>

            <!-- Body -->
            <div class="course-body">
                <div class="course-title" th:text="${course.name}"></div>

                <div class="course-meta">
                    <div class="course-meta-item">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span th:text="${course.lecturer}"></span>
                    </div>
                    <div class="course-meta-item">
                        <span class="course-credits-badge">
                            ⭐ <span th:text="${course.credits}"></span> tín chỉ
                        </span>
                    </div>
                </div>
            </div>

            <!-- Footer: nút đăng ký -->
            <div class="course-footer">
                <!-- Đã đăng ký -->
                <div th:if="${isStudent and enrolledMap[course.id]}" class="btn-enrolled">
                    ✓ Đã đăng ký
                </div>

                <!-- Nút Enroll (STUDENT chưa đăng ký) -->
                <form th:if="${isStudent and !enrolledMap[course.id]}"
                      th:action="@{'/enroll/' + ${course.id}}" method="post" style="margin:0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-enroll">
                        + Đăng ký học phần
                    </button>
                </form>

                <!-- Chưa login -->
                <a th:unless="${isStudent}"
                   th:href="@{/auth/login}"
                   class="btn-login-to-enroll">
                    🔑 Đăng nhập để đăng ký
                </a>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:unless="${coursePage.hasContent()}" class="empty-state">
        <div style="font-size:56px;margin-bottom:16px;">🔍</div>
        <h3 style="color:var(--text);margin-bottom:8px;">Không tìm thấy học phần</h3>
        <p>Thử tìm kiếm với từ khóa khác</p>
        <a th:href="@{/home}" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;">
            Xem tất cả
        </a>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="pagination">
        <a th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}"
           th:classappend="${currentPage == 0} ? 'disabled' : ''"
           class="page-btn">← Trước</a>

        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/home(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active' : ''"
               class="page-btn"></a>
        </th:block>

        <a th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}"
           th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''"
           class="page-btn">Tiếp →</a>
    </div>

</div>

<th:block th:replace="~{fragments/header :: scripts}"/>
</body>
</html>
